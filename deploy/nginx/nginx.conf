# =============================================================================
# Daxelo-Kinrel — Nginx Reverse Proxy Configuration
# =============================================================================
# Production configuration for the Daxelo-Kinrel NestJS API server.
# - NestJS API on Docker container "api" port 3001
# - Cloudflare SSL termination (HTTP from CF) + direct HTTPS with self-signed certs
# - Cloudflare Origin Pull client certificate verification
# - Socket.IO WebSocket support
# =============================================================================

# ---------------------------------------------------------------------------
# Main context
# ---------------------------------------------------------------------------
worker_processes auto;

events {
    worker_connections 2048;
}

http {
    # -----------------------------------------------------------------------
    # Basic settings
    # -----------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    client_max_body_size 50M;

    # -----------------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------------
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # -----------------------------------------------------------------------
    # MIME types
    # -----------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -----------------------------------------------------------------------
    # Gzip compression
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.api+json
        image/svg+xml
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # -----------------------------------------------------------------------
    # Rate limiting
    # -----------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # -----------------------------------------------------------------------
    # Upstream definition
    # -----------------------------------------------------------------------
    upstream api_server {
        server api:3001;
        keepalive 32;
    }

    # -----------------------------------------------------------------------
    # Shared SSL configuration
    # -----------------------------------------------------------------------
    # Modern cipher suite (Mozilla Modern guideline)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # SSL session cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (requires resolver for direct HTTPS; harmless if behind CF)
    # resolver 1.1.1.1 1.0.0.1 valid=300s;
    # resolver_timeout 5s;
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # -----------------------------------------------------------------------
    # Server — HTTP (port 80) → redirect to HTTPS
    # -----------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Health check is also accessible over HTTP for load-balancer probes
        location /api/health {
            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Everything else: redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -----------------------------------------------------------------------
    # Server — HTTPS (port 443)
    # -----------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # -------------------------------------------------------------------
        # SSL certificates
        # -------------------------------------------------------------------
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # SSL protocols
        ssl_protocols TLSv1.2 TLSv1.3;

        # -------------------------------------------------------------------
        # Cloudflare Origin Pull — client certificate verification
        # Cloudflare presents a client cert; Nginx verifies it against the
        # Cloudflare Origin Pull CA to ensure only genuine CF traffic is
        # accepted over the direct HTTPS path.
        # -------------------------------------------------------------------
        ssl_client_certificate /etc/nginx/ssl/cloudflare-origin-pull.pem;
        ssl_verify_client optional;

        # -------------------------------------------------------------------
        # HSTS (6 months; only served over HTTPS)
        # -------------------------------------------------------------------
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

        # -------------------------------------------------------------------
        # Security headers
        # -------------------------------------------------------------------
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Remove potentially leaking headers
        server_tokens off;

        # -------------------------------------------------------------------
        # Proxy timeouts
        # -------------------------------------------------------------------
        proxy_connect_timeout 60s;
        proxy_read_timeout    300s;   # extended for WebSocket / long-polling
        proxy_send_timeout    60s;

        # -------------------------------------------------------------------
        # Health check — no rate limiting, no auth required
        # -------------------------------------------------------------------
        location /api/health {
            proxy_pass http://api_server;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # Access log off for health checks to reduce noise
            access_log off;
        }

        # -------------------------------------------------------------------
        # Static assets / images from Supabase Storage — long cache
        # -------------------------------------------------------------------
        location ~* /api/.*\.(jpg|jpeg|png|webp|gif|svg|ico)$ {
            proxy_pass http://api_server;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache images for 7 days at CDN level
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable" always;
            add_header X-Content-Type-Options nosniff always;
            access_log off;
        }

        # -------------------------------------------------------------------
        # API routes — rate limited
        # -------------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://api_server;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # Pass Cloudflare client certificate info to the application
            proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
            proxy_set_header X-SSL-Client-DN     $ssl_client_s_dn;
        }

        # -------------------------------------------------------------------
        # Socket.IO — WebSocket upgrade support
        # -------------------------------------------------------------------
        location /socket.io/ {
            proxy_pass http://api_server;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade         $http_upgrade;
            proxy_set_header Connection      "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # Long timeout to keep WebSocket connections alive
            proxy_read_timeout 300s;
        }

        # -------------------------------------------------------------------
        # Catch-all — proxy everything else to the API server
        # -------------------------------------------------------------------
        location / {
            proxy_pass http://api_server;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
            proxy_set_header X-SSL-Client-DN     $ssl_client_s_dn;
        }
    }
}
