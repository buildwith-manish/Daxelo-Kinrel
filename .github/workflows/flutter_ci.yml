name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'Daxelo-Kinrel-App/**'
  pull_request:
    branches: [main]
    paths:
      - 'Daxelo-Kinrel-App/**'

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Daxelo-Kinrel-App

    steps:
      - uses: actions/checkout@v4

      - name: Create empty .env file
        run: touch .env

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Isar code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed . || echo "::warning::Code formatting issues detected. Run 'dart format .' to fix."

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: Daxelo-Kinrel-App

    steps:
      - uses: actions/checkout@v4

      - name: Create empty .env file
        run: touch .env

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test

  build_android:
    name: Build Android AAB
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: Daxelo-Kinrel-App

    steps:
      - uses: actions/checkout@v4

      - name: Create empty .env file
        run: touch .env

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Isar code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/daxelo-release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=daxelo
          storeFile=../daxelo-release.jks
          EOF

      - name: Build AAB
        run: |
          flutter build appbundle \
            --dart-define=FLAVOR=prod \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: Daxelo-Kinrel-App/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Check AAB size
        run: |
          AAB_PATH="build/app/outputs/bundle/release/app-release.aab"
          if [ -f "$AAB_PATH" ]; then
            SIZE=$(stat -c%s "$AAB_PATH")
            SIZE_MB=$((SIZE / 1024 / 1024))
            echo "AAB size: ${SIZE_MB}MB"
            if [ "$SIZE_MB" -gt 150 ]; then
              echo "❌ AAB exceeds 150MB Play Store limit!"
              exit 1
            fi
            echo "✅ AAB size within Play Store limit"
          else
            echo "❌ AAB file not found!"
            exit 1
          fi
