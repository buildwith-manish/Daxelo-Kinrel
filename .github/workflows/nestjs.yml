name: NestJS Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nestjs-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Daxelo-Kinrel-Server (primary NestJS backend)
  # ──────────────────────────────────────────────────────────────
  build-server:
    name: Build & Lint — Daxelo-Kinrel-Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Daxelo-Kinrel-Server

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Daxelo-Kinrel-Server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .env for Prisma
        run: |
          echo 'DATABASE_URL="file:./dev.db"' > .env
          echo 'JWT_ACCESS_SECRET=ci-placeholder-secret-that-is-at-least-32-chars' >> .env
          echo 'JWT_REFRESH_SECRET=ci-placeholder-refresh-secret-that-is-at-least-32-chars' >> .env

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build NestJS app
        run: npm run build

      - name: Verify build output
        run: ls -la dist/main.js

      - name: Run linter
        run: npm run lint
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  # backend/ (secondary NestJS backend)
  # ──────────────────────────────────────────────────────────────
  build-backend:
    name: Build & Lint — backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .env for Prisma
        run: |
          echo 'DATABASE_URL="postgresql://ci:ci@localhost:5432/ci_test"' > .env
          echo 'JWT_SECRET=ci-placeholder-secret-that-is-at-least-32-chars' >> .env
          echo 'JWT_REFRESH_SECRET=ci-placeholder-refresh-secret-that-is-at-least-32-chars' >> .env

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build NestJS app
        run: npm run build

      - name: Verify build output
        run: ls -la dist/main.js

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_test"
