name: CI — Analyze & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Flutter Analyze & Test
  # ──────────────────────────────────────────────────────────────
  flutter-ci:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Daxelo-Kinrel-App

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create empty .env file
        run: touch .env

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze Dart code
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --no-pub || echo "::warning::No tests found or tests failed — non-blocking for now"

  # ──────────────────────────────────────────────────────────────
  # Security — Check for leaked secrets
  # ──────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Leak Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Deploy (only on push to main, after CI passes)
