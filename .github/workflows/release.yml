name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Install Android SDK & NDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;28.0.13004108" "platforms;android-35" "build-tools;35.0.0" "cmake;3.22.1"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            Daxelo-Kinrel-App/android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('Daxelo-Kinrel-App/android/**/*.gradle*', 'Daxelo-Kinrel-App/android/**/*.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: cd Daxelo-Kinrel-App && flutter pub get

      - name: Generate Drift code
        run: cd Daxelo-Kinrel-App && dart run build_runner build

      - name: Create keystore for release signing
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > Daxelo-Kinrel-App/android/app/upload-keystore.jks
            echo "storePassword=$KEYSTORE_PASSWORD" > Daxelo-Kinrel-App/android/key.properties
            echo "keyPassword=$KEY_PASSWORD" >> Daxelo-Kinrel-App/android/key.properties
            echo "keyAlias=upload" >> Daxelo-Kinrel-App/android/key.properties
            echo "storeFile=app/upload-keystore.jks" >> Daxelo-Kinrel-App/android/key.properties
            echo "SIGNING_READY=true" >> $GITHUB_ENV
          else
            echo "SIGNING_READY=false" >> $GITHUB_ENV
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Get SHA-1 fingerprint
        run: |
          keytool -list -v \
            -keystore Daxelo-Kinrel-App/android/app/upload-keystore.jks \
            -alias upload \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Build signed release APK
        if: env.SIGNING_READY == 'true'
        run: cd Daxelo-Kinrel-App && flutter build apk --release

      - name: Build unsigned APK
        if: env.SIGNING_READY == 'false'
        run: cd Daxelo-Kinrel-App && flutter build apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: Daxelo-Kinrel-App/build/app/outputs/flutter-apk/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Daxelo-Kinrel-App/build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Cleanup signing artifacts
        if: always()
        run: |
          rm -f Daxelo-Kinrel-App/android/app/upload-keystore.jks
          rm -f Daxelo-Kinrel-App/android/key.properties

  backend-build:
    name: Build Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: cd server && npx prisma generate

      - name: Build
        run: cd server && npm run build

      - name: Run tests
        run: cd server && npm test
