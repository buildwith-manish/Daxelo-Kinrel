# =============================================================================
# Daxelo-Kinrel — Deploy to Oracle Cloud VPS
# =============================================================================
# Triggers on push to main branch. Builds Docker image and deploys to VPS.
#
# Required GitHub Secrets:
#   VPS_HOST          — Oracle Cloud VPS public IP
#   VPS_USER          — SSH user (usually 'ubuntu')
#   VPS_SSH_KEY       — Private SSH key for VPS access
#   VPS_DEPLOY_DIR    — Deployment directory (default: /opt/kinrel)
#
#   All .env.production secrets should be pre-configured on the VPS.
#   This workflow only pulls the latest code and restarts Docker services.
# =============================================================================

name: Deploy to Oracle Cloud VPS

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'deploy/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild Docker images'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  DEPLOY_DIR: /opt/kinrel
  REPO_DIR: /opt/kinrel/repo

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER || 'ubuntu' }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST}"
          
          echo "🚀 Starting deployment to ${VPS_HOST}..."
          
          # Pull latest code
          echo "📦 Pulling latest code..."
          $SSH_CMD "cd ${REPO_DIR} && git fetch origin main && git reset --hard origin/main"
          
          # Run Prisma migrations
          echo "🗄️ Running Prisma migrations..."
          $SSH_CMD "cd ${REPO_DIR}/server && npx prisma migrate deploy" || true
          
          # Deploy Docker stack
          echo "🐳 Deploying Docker stack..."
          BUILD_FLAG=""
          if [[ "${FORCE_REBUILD}" == "true" ]]; then
            BUILD_FLAG="--build"
          fi
          
          $SSH_CMD "cd ${DEPLOY_DIR} && docker compose -f ${REPO_DIR}/deploy/docker-compose.prod.yml --env-file ${DEPLOY_DIR}/.env.production up -d ${BUILD_FLAG}"
          
          # Wait for health check
          echo "⏳ Waiting for health check..."
          sleep 15
          
          # Verify deployment
          echo "🔍 Verifying deployment..."
          HEALTH=$($SSH_CMD "curl -s http://localhost/api/health 2>/dev/null || curl -s http://localhost:3001/api/health 2>/dev/null || echo 'FAILED'")
          echo "Health response: ${HEALTH}"
          
          if echo "${HEALTH}" | grep -q '"status"'; then
            echo "✅ Deployment successful!"
          else
            echo "⚠️ Health check failed — check VPS logs"
            $SSH_CMD "cd ${DEPLOY_DIR} && docker compose -f ${REPO_DIR}/deploy/docker-compose.prod.yml logs --tail=50 api"
            exit 1
          fi

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/vps_key
