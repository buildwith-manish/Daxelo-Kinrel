name: Build Flutter Web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Get dependencies
        run: cd Daxelo-Kinrel-App && flutter pub get

      - name: Generate Drift code
        run: cd Daxelo-Kinrel-App && dart run build_runner build --delete-conflicting-outputs

      - name: Build Web
        run: cd Daxelo-Kinrel-App && flutter build web --release

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: Daxelo-Kinrel-App/build/web/
