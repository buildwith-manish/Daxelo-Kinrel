name: Build Flutter APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Install Android SDK & NDK
        run: |
          # Flutter 3.44.0 requires Android SDK 36 and BuildTools 28.0.3
          yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973" 2>/dev/null || true
          # Also install the latest cmdline-tools in case they're missing
          yes | sdkmanager --licenses 2>/dev/null || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            Daxelo-Kinrel-App/android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('Daxelo-Kinrel-App/android/**/*.gradle*', 'Daxelo-Kinrel-App/android/**/*.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Get dependencies
        run: cd Daxelo-Kinrel-App && flutter pub get

      - name: Generate Drift code
        run: cd Daxelo-Kinrel-App && dart run build_runner build

      - name: Analyze Dart code
        run: cd Daxelo-Kinrel-App && flutter analyze --no-fatal-infos --no-fatal-warnings
        # --no-fatal-infos --no-fatal-warnings: only fail on actual errors
        # Warnings and info won't block the build

      - name: Build APK
        run: cd Daxelo-Kinrel-App && flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: Daxelo-Kinrel-App/build/app/outputs/flutter-apk/app-release.apk
