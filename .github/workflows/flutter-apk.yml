name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Install Android SDK & NDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973" "platforms;android-35" "build-tools;35.0.0" "cmake;3.22.1"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          ls "$ANDROID_HOME/ndk/" || echo "NDK directory not found"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            Daxelo-Kinrel-App/android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('Daxelo-Kinrel-App/android/**/*.gradle*', 'Daxelo-Kinrel-App/android/**/*.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: cd Daxelo-Kinrel-App && flutter pub get

      - name: Generate Drift code
        run: cd Daxelo-Kinrel-App && dart run build_runner build

      - name: Analyze Dart code
        run: cd Daxelo-Kinrel-App && flutter analyze --no-fatal-infos

      - name: Build APK
        run: cd Daxelo-Kinrel-App && flutter build apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: Daxelo-Kinrel-App/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
