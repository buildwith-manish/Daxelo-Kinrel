name: Build Flutter APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Get dependencies
        run: cd Daxelo-Kinrel-App && flutter pub get

      - name: Generate Drift code
        run: cd Daxelo-Kinrel-App && dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: cd Daxelo-Kinrel-App && flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: Daxelo-Kinrel-App/build/app/outputs/flutter-apk/app-release.apk
