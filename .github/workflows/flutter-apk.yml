name: Build Flutter APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Install Android SDK & NDK
        run: |
          # Set ANDROID_HOME (already set on GitHub runners, but be explicit)
          echo "ANDROID_HOME=$ANDROID_HOME"
          # Install NDK and required SDK platforms
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973" "platforms;android-36" "build-tools;36.0.0"
          # Accept all licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          # Verify NDK installed
          ls "$ANDROID_HOME/ndk/" || echo "NDK directory not found"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            Daxelo-Kinrel-App/android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('Daxelo-Kinrel-App/android/**/*.gradle*', 'Daxelo-Kinrel-App/android/**/*.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Get dependencies
        run: cd Daxelo-Kinrel-App && flutter pub get

      - name: Generate Drift code
        run: cd Daxelo-Kinrel-App && dart run build_runner build

      - name: Analyze Dart code
        run: cd Daxelo-Kinrel-App && flutter analyze --no-fatal-infos --no-fatal-warnings
        # --no-fatal-infos --no-fatal-warnings: only fail on actual errors
        # Warnings and info won't block the build

      - name: Build APK
        run: cd Daxelo-Kinrel-App && flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: Daxelo-Kinrel-App/build/app/outputs/flutter-apk/app-release.apk
