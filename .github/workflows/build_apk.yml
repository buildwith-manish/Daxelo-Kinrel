name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    name: Build Flutter Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Find Flutter project root
        run: |
          if [ -f "Daxelo-Kinrel-App/pubspec.yaml" ]; then
            echo "FLUTTER_DIR=Daxelo-Kinrel-App" >> "$GITHUB_ENV"
          elif [ -f "pubspec.yaml" ]; then
            echo "FLUTTER_DIR=." >> "$GITHUB_ENV"
          else
            echo "::error::Could not find Flutter project (pubspec.yaml)"
            exit 1
          fi

      - name: Create .env file
        run: touch .env
        working-directory: ${{ env.FLUTTER_DIR }}

      - name: Flutter pub get
        run: flutter pub get
        working-directory: ${{ env.FLUTTER_DIR }}

      - name: Generate Isar code
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: ${{ env.FLUTTER_DIR }}

      - name: Create key.properties and keystore
        env:
          KS_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          K_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          K_ALIAS: ${{ secrets.KEY_ALIAS }}
          KS_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          cd "$FLUTTER_DIR"
          mkdir -p android/app

          # Only set up signing if all keystore secrets are present
          if [ -n "$KS_BASE64" ] && [ -n "$KS_PASSWORD" ] && [ -n "$K_PASSWORD" ] && [ -n "$K_ALIAS" ]; then
            echo "Setting up release signing..."
            echo "storePassword=$KS_PASSWORD" > android/key.properties
            echo "keyPassword=$K_PASSWORD" >> android/key.properties
            echo "keyAlias=$K_ALIAS" >> android/key.properties
            echo "storeFile=upload-keystore.jks" >> android/key.properties
            echo "$KS_BASE64" | base64 --decode > android/app/upload-keystore.jks
          else
            echo "No keystore secrets found - will sign with debug keys"
          fi

      - name: Build APK
        run: flutter build apk --release
        working-directory: ${{ env.FLUTTER_DIR }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daxelo-kinrel-apk
          path: |
            **/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Show APK size
        if: always()
        run: |
          find . -name "app-release.apk" -exec ls -lh {} \; 2>/dev/null || echo "APK not found"
        working-directory: ${{ env.FLUTTER_DIR }}
