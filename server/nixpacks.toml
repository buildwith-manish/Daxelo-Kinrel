# =============================================================================
# Daxelo-Kinrel — Nixpacks Build Configuration
# =============================================================================
# Used by Render (and other Nixpacks-compatible platforms) to build the
# NestJS server automatically without a custom Dockerfile.
#
# IMPORTANT: The Dockerfile is the preferred build method for Render
# because it gives us full control over the Node version. This nixpacks.toml
# is kept as a fallback for other platforms.
# =============================================================================

[provider]
name = "node"

# ── Install Phase ────────────────────────────────────────────────────────────
# NODE_ENV is explicitly set to empty string to ensure npm ci installs
# devDependencies (prisma, @nestjs/cli, typescript) which are needed for build.
# Render's Node runtime sets NODE_ENV=production by default, which would
# cause npm ci to skip devDependencies — breaking the build.

[phases.install]
cmds = [
    "NODE_ENV= npm ci",
    "npx prisma generate",
]

# ── Build Phase ──────────────────────────────────────────────────────────────

[phases.build]
cmds = [
    "npm run build",
]

# ── Start Phase ──────────────────────────────────────────────────────────────
# The command that runs when the container starts.
# IMPORTANT: PORT env var must be set on Render (default: 10000 for Render).

[start]
cmd = "node dist/main"

# ── Variables ────────────────────────────────────────────────────────────────
# Do NOT set NODE_ENV=production here — it would skip devDependencies during
# install phase. Nixpacks handles devDependency pruning after build automatically.

[variables]
