name: kinrel
description: DAXELO KINREL — Indian Family Relationship Intelligence
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # Networking
  dio: ^5.8.0+1
  
  # Supabase
  supabase_flutter: ^2.8.4
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # Local Database (Offline-First)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # Responsive
  responsive_framework: ^1.5.1
  
  # Animation
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  
  # Images
  cached_network_image: ^3.4.1
  
  # UI Utilities
  shimmer: ^3.0.0
  flutter_svg: ^2.1.0+1
  smooth_page_indicator: ^1.2.0
  
  # Utilities
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.4
  uuid: ^4.5.1
  logger: ^2.6.0
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  package_info_plus: ^8.3.0
  in_app_review: ^2.0.9

  # Media & Device
  image_picker: ^1.0.7
  image_cropper: ^8.0.0
  local_auth: ^2.2.0
  webview_flutter: ^4.7.0
  
  # Math/Graph
  collection: ^1.19.1
  flutter_dotenv: ^6.0.1

  # Firebase — Crash Reporting, Analytics & Push Notifications
  firebase_core: ^3.13.0
  firebase_crashlytics: ^4.3.5
  firebase_analytics: ^11.0.0
  firebase_messaging: ^15.2.5
  firebase_remote_config: ^5.0.0

  # Local Notifications (foreground FCM display)
  flutter_local_notifications: ^19.0.0
  google_fonts: ^8.1.0
  socket_io_client: ^3.1.4
  app_links: ^7.1.1

  # QR Code generation
  qr_flutter: ^4.1.0

  # Timezone support (required by flutter_local_notifications scheduling)
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  
  # Linting
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - .env
    - assets/data/
    - assets/data/global/
    - assets/icons/
    - assets/images/
    - assets/fonts/
    - assets/privacy_policy.md
  
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/Outfit-ExtraBold.ttf
          weight: 800
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
    - family: DMMono
      fonts:
        - asset: assets/fonts/DMMono-Regular.ttf
        - asset: assets/fonts/DMMono-Medium.ttf
          weight: 500
    # ── Bundled Indian script fonts (covers 80%+ of Indian users) ──
    # NotoSans: Latin + Devanagari (Hindi, Marathi, Nepali, Sanskrit)
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
    - family: NotoSansTamil
      fonts:
        - asset: assets/fonts/NotoSansTamil-Regular.ttf
    - family: NotoSansTelugu
      fonts:
        - asset: assets/fonts/NotoSansTelugu-Regular.ttf
    - family: NotoSansBengali
      fonts:
        - asset: assets/fonts/NotoSansBengali-Regular.ttf
