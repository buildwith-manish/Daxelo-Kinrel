workflows:
  # ─────────────────────────────────────────────────────────────────
  # ANDROID — triggers on every push to main
  # ─────────────────────────────────────────────────────────────────
  android-workflow:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m4

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    environment:
      flutter: stable
      java: '17'
      vars:
        SUPABASE_URL:
          required: false
        SUPABASE_ANON_KEY:
          required: false
        API_BASE_URL:
          required: false

    scripts:
      - name: Create .env file with fallback defaults
        script: |
          DEFAULT_SUPABASE_URL="https://promxswvsnvilplmrtsj.supabase.co"
          DEFAULT_SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByb214c3d2c252aWxwbG1ydHNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTcxODAsImV4cCI6MjA5NTE3MzE4MH0.70VPcCiCItKPx56cH-Y0DmcvWnrBiegmDkjv-V21taY"
          DEFAULT_API_BASE_URL="https://daxelo-kinrel-server.onrender.com"

          FINAL_SUPABASE_URL="${SUPABASE_URL:-$DEFAULT_SUPABASE_URL}"
          FINAL_SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY:-$DEFAULT_SUPABASE_ANON_KEY}"
          FINAL_API_BASE_URL="${API_BASE_URL:-$DEFAULT_API_BASE_URL}"

          echo "SUPABASE_URL=$FINAL_SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$FINAL_SUPABASE_ANON_KEY" >> .env
          echo "API_BASE_URL=$FINAL_API_BASE_URL" >> .env
          echo "✅ .env file created"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Analyze code
        script: flutter analyze --no-fatal-warnings || true

      - name: Build APK (release)
        script: |
          BUILD_NUMBER="${CM_BUILD_NUMBER:-1}"
          flutter build apk --release --build-number="$BUILD_NUMBER"

      - name: Rename APK with build info
        script: |
          BUILD_NUMBER="${CM_BUILD_NUMBER:-1}"
          BRANCH=$(echo "${CM_BRANCH:-main}" | tr '/' '-')
          SRC="build/app/outputs/flutter-apk/app-release.apk"
          DST="build/app/outputs/flutter-apk/kinrel-${BRANCH}-${BUILD_NUMBER}.apk"
          if [ -f "$SRC" ]; then
            cp "$SRC" "$DST"
            echo "✅ APK renamed: kinrel-${BRANCH}-${BUILD_NUMBER}.apk"
          else
            echo "⚠️ APK not found at $SRC"
          fi

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  # ─────────────────────────────────────────────────────────────────
  # iOS — triggers on every push to main
  # ─────────────────────────────────────────────────────────────────
  ios-workflow:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m4

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    environment:
      flutter: stable
      xcode: latest
      vars:
        SUPABASE_URL:
          required: false
        SUPABASE_ANON_KEY:
          required: false
        API_BASE_URL:
          required: false

    scripts:
      - name: Create .env file with fallback defaults
        script: |
          DEFAULT_SUPABASE_URL="https://promxswvsnvilplmrtsj.supabase.co"
          DEFAULT_SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByb214c3d2c252aWxwbG1ydHNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTcxODAsImV4cCI6MjA5NTE3MzE4MH0.70VPcCiCItKPx56cH-Y0DmcvWnrBiegmDkjv-V21taY"
          DEFAULT_API_BASE_URL="https://daxelo-kinrel-server.onrender.com"

          FINAL_SUPABASE_URL="${SUPABASE_URL:-$DEFAULT_SUPABASE_URL}"
          FINAL_SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY:-$DEFAULT_SUPABASE_ANON_KEY}"
          FINAL_API_BASE_URL="${API_BASE_URL:-$DEFAULT_API_BASE_URL}"

          echo "SUPABASE_URL=$FINAL_SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$FINAL_SUPABASE_ANON_KEY" >> .env
          echo "API_BASE_URL=$FINAL_API_BASE_URL" >> .env
          echo "✅ .env file created"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install && cd ..

      - name: Analyze code
        script: flutter analyze --no-fatal-warnings || true

      - name: Build iOS (no code sign)
        script: |
          BUILD_NUMBER="${CM_BUILD_NUMBER:-1}"
          flutter build ios --release --no-codesign --build-number="$BUILD_NUMBER"

    artifacts:
      - build/ios/ipa/*.ipa
