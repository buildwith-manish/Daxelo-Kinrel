workflows:

  # ─────────────────────────────────────────────────────────────────
  # ANDROID — triggers on every push to main or develop
  # ─────────────────────────────────────────────────────────────────
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m4
    working_directory: Daxelo-Kinrel-App

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true
      tag_patterns:
        - pattern: 'v*'
          include: true
      cancel_previous_builds: true

    environment:
      flutter: stable
      java: '17'
      vars:
        SUPABASE_URL: $SUPABASE_URL
        SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
        API_BASE_URL: $API_BASE_URL

    scripts:
      - name: Create .env file
        script: |
          FINAL_URL="${SUPABASE_URL:-https://promxswvsnvilplmrtsj.supabase.co}"
          FINAL_KEY="${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByb214c3d2c252aWxwbG1ydHNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTcxODAsImV4cCI6MjA5NTE3MzE4MH0.70VPcCiCItKPx56cH-Y0DmcvWnrBiegmDkjv-V21taY}"
          FINAL_API="${API_BASE_URL:-https://daxelo-kinrel-server.onrender.com}"
          echo "SUPABASE_URL=$FINAL_URL" > .env
          echo "SUPABASE_ANON_KEY=$FINAL_KEY" >> .env
          echo "API_BASE_URL=$FINAL_API" >> .env
          echo "✅ .env created — URL=$FINAL_URL"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Analyze code
        script: flutter analyze --no-fatal-warnings

      - name: Run tests
        script: flutter test --no-pub || true

      - name: Build APK (release)
        script: |
          BUILD_NUMBER="${CM_BUILD_NUMBER:-1}"
          flutter build apk \
            --release \
            --build-number="$BUILD_NUMBER"

      - name: Rename APK with build info
        script: |
          BUILD_NUMBER="${CM_BUILD_NUMBER:-1}"
          BRANCH=$(echo "${CM_BRANCH:-main}" | tr '/' '-')
          SRC="build/app/outputs/flutter-apk/app-release.apk"
          DST="build/app/outputs/flutter-apk/kinrel-${BRANCH}-${BUILD_NUMBER}.apk"
          if [ -f "$SRC" ]; then
            cp "$SRC" "$DST"
            echo "✅ APK: kinrel-${BRANCH}-${BUILD_NUMBER}.apk"
          else
            echo "⚠️  APK not found at $SRC"
            ls build/app/outputs/ || true
          fi

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  # ─────────────────────────────────────────────────────────────────
  # iOS — triggers on every push to main or develop
  # ─────────────────────────────────────────────────────────────────
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m4
    working_directory: Daxelo-Kinrel-App

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true
      tag_patterns:
        - pattern: 'v*'
          include: true
      cancel_previous_builds: true

    environment:
      flutter: stable
      xcode: latest
      vars:
        SUPABASE_URL: $SUPABASE_URL
        SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
        API_BASE_URL: $API_BASE_URL

    scripts:
      - name: Create .env file
        script: |
          FINAL_URL="${SUPABASE_URL:-https://promxswvsnvilplmrtsj.supabase.co}"
          FINAL_KEY="${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByb214c3d2c252aWxwbG1ydHNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTcxODAsImV4cCI6MjA5NTE3MzE4MH0.70VPcCiCItKPx56cH-Y0DmcvWnrBiegmDkjv-V21taY}"
          FINAL_API="${API_BASE_URL:-https://daxelo-kinrel-server.onrender.com}"
          echo "SUPABASE_URL=$FINAL_URL" > .env
          echo "SUPABASE_ANON_KEY=$FINAL_KEY" >> .env
          echo "API_BASE_URL=$FINAL_API" >> .env
          echo "✅ .env created"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;

      - name: Analyze code
        script: flutter analyze --no-fatal-warnings

      - name: Build iOS (no code sign)
        script: |
          BUILD_NUMBER="${CM_BUILD_NUMBER:-1}"
          flutter build ios \
            --release \
            --no-codesign \
            --build-number="$BUILD_NUMBER"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
