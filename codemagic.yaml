      cancel_previous_builds: true
    environment:
      flutter: stable
      vars:
        SUPABASE_URL: $SUPABASE_URL
        SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
        API_BASE_URL: $API_BASE_URL
    scripts:
      - name: Create .env file with fallback defaults
        script: |
          DEFAULT_SUPABASE_URL="https://promxswvsnvilplmrtsj.supabase.co"
          DEFAULT_SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByb214c3d2c252aWxwbG1ydHNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTcxODAsImV4cCI6MjA5NTE3MzE4MH0.70VPcCiCItKPx56cH-Y0DmcvWnrBiegmDkjv-V21taY"
          DEFAULT_API_BASE_URL="https://daxelo-kinrel-server.onrender.com"

          FINAL_SUPABASE_URL="${SUPABASE_URL:-$DEFAULT_SUPABASE_URL}"
          FINAL_SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY:-$DEFAULT_SUPABASE_ANON_KEY}"
          FINAL_API_BASE_URL="${API_BASE_URL:-$DEFAULT_API_BASE_URL}"

          [ -z "$FINAL_SUPABASE_URL" ] && FINAL_SUPABASE_URL="$DEFAULT_SUPABASE_URL"
          [ -z "$FINAL_SUPABASE_ANON_KEY" ] && FINAL_SUPABASE_ANON_KEY="$DEFAULT_SUPABASE_ANON_KEY"
          [ -z "$FINAL_API_BASE_URL" ] && FINAL_API_BASE_URL="$DEFAULT_API_BASE_URL"

          echo "# Supabase Configuration" > .env
          echo "SUPABASE_URL=$FINAL_SUPABASE_URL" >> .env
          echo "SUPABASE_ANON_KEY=$FINAL_SUPABASE_ANON_KEY" >> .env
          echo "" >> .env
          echo "# API Base URL" >> .env
          echo "API_BASE_URL=$FINAL_API_BASE_URL" >> .env

          echo "✅ .env file created"
