# =============================================================================
# Daxelo-Kinrel — Render Blueprint
# =============================================================================
# This file configures the Render deployment for the NestJS server.
# Render auto-detects this file at the repo root.
#
# How to use:
#   1. Go to Render Dashboard → New → Blueprint
#   2. Select this repository
#   3. Render will read this render.yaml and create the service
#   4. Add the required secrets (sync: false) in the Environment section
#
# IMPORTANT: Uses Docker runtime (not Node) because:
#   - NestJS 11 requires Node >= 20, but Render defaults to Node 18
#   - Node runtime sets NODE_ENV=production during build, skipping devDeps
#   - Docker runtime gives us full control over Node version and build env
#
# Prerequisites:
#   - Set the following secrets in Render Dashboard > Environment:
#     DATABASE_URL, DIRECT_URL, JWT_ACCESS_SECRET, SUPABASE_JWT_SECRET,
#     SUPABASE_ANON_KEY, SUPABASE_URL, GEMINI_API_KEY, etc.
# =============================================================================

services:
  - type: web
    name: daxelo-kinrel-server
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: server
    plan: free
    # No buildCommand/startCommand needed — Dockerfile handles everything
    # CMD ["node", "dist/main"] is set in the Dockerfile
    envVars:
      - key: PORT
        value: 10000
      - key: API_PREFIX
        value: api
      # ── Database (Supabase PostgreSQL) ──────────────────────────────
      # DATABASE_URL: Pooled connection (port 6543) — for runtime queries
      - key: DATABASE_URL
        sync: false
      # DIRECT_URL: Direct connection (port 5432) — for Prisma db push
      - key: DIRECT_URL
        sync: false
      # ── Auth ────────────────────────────────────────────────────────
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      # ── AI ──────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
